<!DOCTYPE html>
<html lang="es">

<head>
    <title>Casa Embrujada - Exploración 3D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
</head>

<body>

<script type="importmap">
{
    "imports": {
        "three": "../build/three.module.js",
        "three/addons/": "./jsm/"
    }
}
</script>

<script type="module">

import * as THREE from 'three';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ------------------------------------------------
// VARIABLES GLOBALES
// ------------------------------------------------

let camera, scene, renderer;
let character, mixer;

let idleAction;
let walkAction;
let runAction;
let activeAction;

const clock = new THREE.Clock();

const keys = {
    w: false,
    a: false,
    s: false,
    d: false,
    shift: false
};

const moveSpeed = 1.0;
const runSpeed = 2.0;
const rotateSpeed = 0.05;

// ------------------------------------------------
// INICIO
// ------------------------------------------------

init();
animate();

// ------------------------------------------------
// INIT
// ------------------------------------------------

function init() {

    // ESCENA
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x888888);

    // niebla gris clara
    scene.fog = new THREE.Fog(0xcccccc, 30, 300);

    // CAMARA
    camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        1,
        3000
    );

    camera.position.set(0, 80, 150);

    // ------------------------------------------------
    // LUCES
    // ------------------------------------------------

    const hemiLight = new THREE.HemisphereLight(
        0xffffff,
        0x444444,
        3
    );
    hemiLight.position.set(0, 200, 0);
    scene.add(hemiLight);

    const moonLight = new THREE.DirectionalLight(
        0xffffff,
        4
    );
    moonLight.position.set(100, 300, 100);
    moonLight.castShadow = true;
    scene.add(moonLight);

    const topLight = new THREE.DirectionalLight(
        0xffffff,
        3
    );
    topLight.position.set(0, 500, 0);
    topLight.castShadow = true;
    scene.add(topLight);

    // helper visual
    const axesHelper = new THREE.AxesHelper(100);
    scene.add(axesHelper);

    // ------------------------------------------------
    // PISO
    // ------------------------------------------------

    const textureLoader = new THREE.TextureLoader();

    const floorTexture = textureLoader.load(
        './textures/cespet.jpg'
    );

    floorTexture.wrapS = THREE.RepeatWrapping;
    floorTexture.wrapT = THREE.RepeatWrapping;
    floorTexture.repeat.set(20, 20);

    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(3000, 3000),
        new THREE.MeshStandardMaterial({
            map: floorTexture
        })
    );

    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // ------------------------------------------------
    // RENDER
    // ------------------------------------------------

    renderer = new THREE.WebGLRenderer({
        antialias: true
    });

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    document.body.appendChild(renderer.domElement);

    // ------------------------------------------------
    // CARGAR CASA
    // ------------------------------------------------

    loadHouse();

    // ------------------------------------------------
    // CARGAR PERSONAJE
    // ------------------------------------------------

    loadCharacter();

    // ------------------------------------------------
    // TECLADO
    // ------------------------------------------------

    setupKeyboard();

    // ------------------------------------------------
    // RESPONSIVE
    // ------------------------------------------------

    window.addEventListener(
        'resize',
        onWindowResize
    );
}

// ------------------------------------------------
// CARGAR CASA
// ------------------------------------------------

function loadHouse() {

    const gltfLoader = new GLTFLoader();

    gltfLoader.load(
        './models/casa/mansionInterior.glb',

        function (gltf) {

            const house = gltf.scene;

            house.scale.set(25, 25, 25);
            house.position.set(0, 0, 0);

            house.traverse(function (child) {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(house);

            console.log("Casa cargada correctamente");
        },

        undefined,

        function (error) {
            console.error("Error casa:", error);
        }
    );
}

// ------------------------------------------------
// CARGAR PERSONAJE
// ------------------------------------------------

function loadCharacter() {

    const fbxLoader = new FBXLoader();

    // IDLE
    fbxLoader.load(
        './models/personaje/idle.fbx',

        function (fbx) {

            character = fbx;

            character.scale.set(
                0.2,
                0.2,
                0.2
            );

            character.position.set(
                0,
                0,
                5
            );

            character.traverse(function (child) {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(character);

            mixer = new THREE.AnimationMixer(character);

            idleAction = mixer.clipAction(
                fbx.animations[0]
            );

            idleAction.play();
            activeAction = idleAction;

            // WALK
            fbxLoader.load(
                './models/personaje/Injured Walking.fbx',

                function (walkAnim) {

                    walkAction = mixer.clipAction(
                        walkAnim.animations[0]
                    );

                    // RUN
                    fbxLoader.load(
                        './models/personaje/Slow Run.fbx',

                        function (runAnim) {

                            runAction = mixer.clipAction(
                                runAnim.animations[0]
                            );

                            console.log(
                                "Todas las animaciones cargadas"
                            );
                        }
                    );
                }
            );

            console.log("Personaje cargado");
        },

        undefined,

        function (error) {
            console.error("Error personaje:", error);
        }
    );
}

// ------------------------------------------------
// CAMBIAR ANIMACION
// ------------------------------------------------

function switchAnimation(newAction) {

    if (!newAction) return;
    if (activeAction === newAction) return;

    activeAction.fadeOut(0.3);

    newAction
        .reset()
        .fadeIn(0.3)
        .play();

    activeAction = newAction;
}

// ------------------------------------------------
// TECLADO
// ------------------------------------------------

function setupKeyboard() {

    document.addEventListener(
        "keydown",
        function (event) {

            const key = event.key.toLowerCase();

            if (key === "w") keys.w = true;
            if (key === "a") keys.a = true;
            if (key === "s") keys.s = true;
            if (key === "d") keys.d = true;

            if (event.shiftKey) {
                keys.shift = true;
            }
        }
    );

    document.addEventListener(
        "keyup",
        function (event) {

            const key = event.key.toLowerCase();

            if (key === "w") keys.w = false;
            if (key === "a") keys.a = false;
            if (key === "s") keys.s = false;
            if (key === "d") keys.d = false;

            keys.shift = false;
        }
    );
}

// ------------------------------------------------
// RESPONSIVE
// ------------------------------------------------

function onWindowResize() {

    camera.aspect =
        window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
}

// ------------------------------------------------
// ANIMATE
// ------------------------------------------------

function animate() {

    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (mixer) {
        mixer.update(delta);
    }

    if (character) {

        let moving = false;
        let speed = keys.shift ? runSpeed : moveSpeed;

        // ADELANTE
        if (keys.w) {
            character.translateZ(
                speed * delta * 50
            );
            moving = true;
        }

        // ATRAS
        if (keys.s) {
            character.translateZ(
                -speed * delta * 50
            );
            moving = true;
        }

        // GIRAR IZQUIERDA
        if (keys.a) {
            character.rotation.y += rotateSpeed;
        }

        // GIRAR DERECHA
        if (keys.d) {
            character.rotation.y -= rotateSpeed;
        }

        // CAMBIO DE ANIMACION
        if (moving) {

            if (keys.shift && runAction) {
                switchAnimation(runAction);
            }
            else if (walkAction) {
                switchAnimation(walkAction);
            }

        } else {

            if (idleAction) {
                switchAnimation(idleAction);
            }
        }

        // ------------------------------------------------
        // CAMARA SIGUIENDO AL PERSONAJE
        // ------------------------------------------------

        const offset = new THREE.Vector3(
            0,     // izquierda / derecha
            80,    // altura
            -150   // distancia atrás
        );

        // rota junto con el personaje
        offset.applyQuaternion(
            character.quaternion
        );

        // nueva posición de cámara
        camera.position.copy(
            character.position.clone().add(offset)
        );

        // mirar al personaje
        camera.lookAt(
            character.position.x,
            character.position.y + 40,
            character.position.z
        );
    }

    renderer.render(scene, camera);
}

</script>

</body>
</html>
